name: docker-fork

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker tag to publish
        required: true
        default: custom
        type: string
      rust_profile:
        description: Cargo profile passed to Dockerfile
        required: true
        default: dist
        type: string
      rust_features:
        description: Comma-separated feature list passed to Dockerfile
        required: true
        default: aws-kms,gcp-kms,turnkey,cli,asm-keccak,js-tracer
        type: string
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  DEFAULT_RUST_PROFILE: dist
  DEFAULT_RUST_FEATURES: aws-kms,gcp-kms,turnkey,cli,asm-keccak,js-tracer

jobs:
  vars:
    name: resolve build inputs
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      profile: ${{ steps.vars.outputs.profile }}
      features: ${{ steps.vars.outputs.features }}
      image_name: ${{ steps.vars.outputs.image_name }}
      build_date: ${{ steps.vars.outputs.build_date }}
    steps:
      - name: Resolve build inputs
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.image_tag }}"
            PROFILE="${{ inputs.rust_profile }}"
            FEATURES="${{ inputs.rust_features }}"
          elif [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" == "master" ]]; then
            TAG="latest"
            PROFILE="${DEFAULT_RUST_PROFILE}"
            FEATURES="${DEFAULT_RUST_FEATURES}"
          else
            TAG="${GITHUB_REF_NAME}"
            PROFILE="${DEFAULT_RUST_PROFILE}"
            FEATURES="${DEFAULT_RUST_FEATURES}"
          fi

          TAG_SAFE="${TAG//\//-}"
          IMAGE_NAME="$(printf '%s' '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            printf 'tag=%s\n' "$TAG_SAFE"
            printf 'profile=%s\n' "$PROFILE"
            printf 'features=%s\n' "$FEATURES"
            printf 'image_name=%s\n' "$IMAGE_NAME"
            printf 'build_date=%s\n' "$BUILD_DATE"
          } >> "$GITHUB_OUTPUT"

  build:
    name: build and push (${{ matrix.platform_slug }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: vars
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_slug: amd64
          - platform: linux/arm64
            platform_slug: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ needs.vars.outputs.image_name }},name-canonical=true,push-by-digest=true,push=true
          build-args: |
            RUST_PROFILE=${{ needs.vars.outputs.profile }}
            RUST_FEATURES=${{ needs.vars.outputs.features }}
            TAG_NAME=${{ needs.vars.outputs.tag }}
            VERGEN_GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ needs.vars.outputs.build_date }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ needs.vars.outputs.tag }}

      - name: Export digest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform_slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: merge multi-arch manifest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - vars
      - build
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Create manifest list
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="${{ env.REGISTRY }}/${{ needs.vars.outputs.image_name }}"
          refs=()
          for f in /tmp/digests/*; do
            refs+=("${IMAGE}@sha256:$(basename "$f")")
          done

          docker buildx imagetools create \
            -t "${IMAGE}:${{ needs.vars.outputs.tag }}" \
            -t "${IMAGE}:sha-${{ github.sha }}" \
            "${refs[@]}"
